<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABC AR Adventure Game for Kids</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22%3A%22ABC%20AR%20Adventure%22%2C%22short_name%22%3A%22ABC%20AR%22%2C%22start_url%22%3A%22index.html%22%2C%22display%22%3A%22standalone%22%2C%22orientation%22%3A%22any%22%2C%22background_color%22%3A%22%23a6c1ee%22%2C%22theme_color%22%3A%22%23FF4A82%22%7D">

    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            overflow: hidden;
            touch-action: none;
        }
        #webcam {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            visibility: hidden;
        }
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }
    </style>
</head>
<body class="w-screen h-screen flex items-center justify-center m-0 p-0 select-none">

    <video id="webcam" autoplay playsinline></video>
    <canvas id="gameCanvas"></canvas>

    <div id="handOverlayAlert" class="absolute top-5 left-1/2 transform -translate-x-1/2 z-50 pointer-events-none hidden">
        <div class="bg-red-500/80 text-white font-bold px-6 py-3 rounded-full shadow-lg text-sm sm:text-lg animate-bounce flex items-center gap-2 backdrop-blur-sm">
            <span>✋</span> Looking for your hand... (You can also drag with touch/mouse!)
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('webcam');
        const handAlert = document.getElementById('handOverlayAlert');

        // --- Device Type & Layout Detector ---
        let isMobile = false;
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            isMobile = canvas.height > canvas.width;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- Game State & Data ---
        let gameState = 'START'; 
        let score = 0;
        let currentRound = 1;
        const totalRounds = 5;
        let roundStartTime = 0;
        
        let targetLetter = ''; 
        let options = []; 
        let draggedElement = null; 
        let letterMode = 'UPPER'; 
        let difficulty = 'EASY'; 
        let correctStreak = 0;
        let isTransitioning = false; 

        // ตัวแปรระบบ Buffer ป้องกันนิ้วหลุดสะดุด
        let lastPinchTime = 0;
        const UNPINCH_BUFFER_TIME = 300; 

        const praisePhrases = {
            low: ["Good job!", "Correct! Nice work.", "You got it!"],
            medium: ["Wonderful! You are doing great!", "Amazing! Keep it up!", "Excellent!"],
            high: ["Unbelievable! Superstar!", "Spectacular! Perfect!", "Wow! Unstoppable!"]
        };

        function speak(text, customRate = null) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                
                if (customRate) {
                    utterance.rate = customRate;
                } else if (text.length === 1) {
                    utterance.rate = 0.45; 
                } else {
                    utterance.rate = 0.65; 
                }
                
                let basePitch = 1.15;
                if (correctStreak >= 2 && correctStreak < 4) basePitch = 1.25;
                if (correctStreak >= 4) basePitch = 1.35;
                utterance.pitch = basePitch;

                const voices = window.speechSynthesis.getVoices();
                const femaleUSVoice = voices.find(voice => 
                    voice.lang.includes('en-US') && 
                    (voice.name.toLowerCase().includes('female') || 
                     voice.name.toLowerCase().includes('zira') || 
                     voice.name.toLowerCase().includes('samantha') || 
                     voice.name.toLowerCase().includes('google us english'))
                );
                
                if (femaleUSVoice) utterance.voice = femaleUSVoice;
                window.speechSynthesis.speak(utterance);
            }
        }
        
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = () => {};
        }

        const alphabetPairs = [
            { upper: 'A', lower: 'a' }, { upper: 'B', lower: 'b' }, { upper: 'C', lower: 'c' },
            { upper: 'D', lower: 'd' }, { upper: 'E', lower: 'e' }, { upper: 'F', lower: 'f' },
            { upper: 'G', lower: 'g' }, { upper: 'H', lower: 'h' }, { upper: 'I', lower: 'i' },
            { upper: 'J', lower: 'k' }, { upper: 'K', lower: 'k' }, { upper: 'L', lower: 'l' },
            { upper: 'M', lower: 'm' }, { upper: 'N', lower: 'n' }, { upper: 'O', lower: 'o' },
            { upper: 'P', lower: 'p' }, { upper: 'Q', lower: 'q' }, { upper: 'R', lower: 'r' },
            { upper: 'S', lower: 's' }, { upper: 'T', lower: 't' }, { upper: 'U', lower: 'u' },
            { upper: 'V', lower: 'v' }, { upper: 'W', lower: 'w' }, { upper: 'X', lower: 'x' },
            { upper: 'Y', lower: 'y' }, { upper: 'Z', lower: 'z' }
        ];

        // --- Buttons & Interactive Elements Dimensions ---
        let buttons = {
            startBtn: { x: 0, y: 0, w: 240, h: 75, text: 'Start Game' },
            modeUpperBtn: { x: 0, y: 0, w: 180, h: 80, text: 'A-Z' },
            modeLowerBtn: { x: 0, y: 0, w: 180, h: 80, text: 'a-z' },
            diffEasyBtn: { x: 0, y: 0, w: 150, h: 65, text: 'Easy' },
            diffMedBtn: { x: 0, y: 0, w: 150, h: 65, text: 'Medium' },
            diffHardBtn: { x: 0, y: 0, w: 150, h: 65, text: 'Hard' },
            nextBtn: { x: 0, y: 0, w: 200, h: 70, text: 'Let\'s Go! ➔' },
            audioBtn: { x: 0, y: 0, w: 160, h: 55, text: '🔊 Listen' }
        };

        let dropZone = { x: 0, y: 0, w: 240, h: 180 }; 
        let SNAP_DISTANCE = 90;

        // --- Hand Tracking & Cursor Data ---
        let handDetected = false;
        let lastHandSeenTime = 0;
        let pointerX = 0, pointerY = 0; 
        let isPinching = false; 
        let cursorStatus = 'NORMAL'; 
        let rawHandResults = null;

        // Mobile Touch & Mouse Fallback Handling
        let isMouseDown = false;
        function handlePointerMove(x, y) {
            pointerX = x;
            pointerY = y;
            lastHandSeenTime = Date.now(); 
        }
        window.addEventListener('mousemove', (e) => handlePointerMove(e.clientX, e.clientY));
        window.addEventListener('mousedown', () => { isMouseDown = true; isPinching = true; lastPinchTime = Date.now(); });
        window.addEventListener('mouseup', () => { isMouseDown = false; isPinching = false; if (draggedElement) checkDropSuccess(); });

        window.addEventListener('touchmove', (e) => { if(e.touches.length>0) handlePointerMove(e.touches[0].clientX, e.touches[0].clientY); });
        window.addEventListener('touchstart', (e) => { isMouseDown = true; isPinching = true; lastPinchTime = Date.now(); if(e.touches.length>0) handlePointerMove(e.touches[0].clientX, e.touches[0].clientY); });
        window.addEventListener('touchend', () => { isMouseDown = false; isPinching = false; if (draggedElement) checkDropSuccess(); });

        // --- Responsive Card Grid Generator ---
        function initRound() {
            isTransitioning = false;
            draggedElement = null; 
            roundStartTime = Date.now();
            
            let pair = alphabetPairs[Math.floor(Math.random() * alphabetPairs.length)];
            targetLetter = (letterMode === 'UPPER') ? pair.upper : pair.lower;

            let cardCount = difficulty === 'EASY' ? 3 : (difficulty === 'MEDIUM' ? 6 : 10);
            let choices = [targetLetter];
            while(choices.length < cardCount) {
                let p = alphabetPairs[Math.floor(Math.random() * alphabetPairs.length)];
                let l = (letterMode === 'UPPER') ? p.upper : p.lower;
                if(!choices.includes(l)) choices.push(l);
            }
            choices.sort(() => Math.random() - 0.5);

            options = [];
            
            let cols, rows;
            if (!isMobile) {
                cols = difficulty === 'HARD' ? 5 : 3;
                rows = difficulty === 'EASY' ? 1 : 2;
            } else {
                cols = difficulty === 'HARD' ? 3 : 2;
                if (difficulty === 'EASY') cols = 3; 
                rows = Math.ceil(cardCount / cols);
            }

            let cardW = isMobile ? Math.min(85, canvas.width / (cols + 1)) : 110;
            let cardH = isMobile ? cardW * 1.25 : 140;
            let gapX = isMobile ? 12 : 25;
            let gapY = isMobile ? 10 : 15;

            if (difficulty === 'HARD' && !isMobile) { cardW = 95; cardH = 120; gapX = 15; }

            let totalGridW = (cols * cardW) + ((cols - 1) * gapX);
            let startX = (canvas.width - totalGridW) / 2;
            let startY = isMobile ? 140 : 125; 

            choices.forEach((char, index) => {
                let r = Math.floor(index / cols);
                let c = index % cols;
                let originalX = startX + (c * (cardW + gapX));
                let originalY = startY + (r * (cardH + gapY));

                options.push({
                    char: char,
                    x: originalX, y: originalY,
                    ox: originalX, oy: originalY,
                    w: cardW, h: cardH,
                    ow: cardW, oh: cardH,
                    color: `hsl(${(index * (360 / cardCount))}, 85%, 62%)`,
                    isTarget: char === targetLetter,
                    offsetX: 0, offsetY: 0,
                    isSnapped: false
                });
            });

            setTimeout(() => { speak(`Find the letter ${targetLetter}`); }, 600);
        }

        function checkDropSuccess() {
            if (!draggedElement || isTransitioning) return;

            let cardCenterX = draggedElement.x + draggedElement.w / 2;
            let cardCenterY = draggedElement.y + draggedElement.h / 2;
            let zoneCenterX = dropZone.x + dropZone.w / 2;
            let zoneCenterY = dropZone.y + dropZone.h / 2;

            let distToCenter = Math.sqrt(Math.pow(cardCenterX - zoneCenterX, 2) + Math.pow(cardCenterY - zoneCenterY, 2));

            if (distToCenter < SNAP_DISTANCE || draggedElement.isSnapped) {
                if (draggedElement.isTarget) {
                    isTransitioning = true; 
                    draggedElement.isSnapped = true;
                    draggedElement.x = dropZone.x;
                    draggedElement.y = dropZone.y;
                    draggedElement.w = dropZone.w;
                    draggedElement.h = dropZone.h;

                    correctStreak++;
                    let timeTaken = (Date.now() - roundStartTime) / 1000;
                    score += Math.max(30, Math.round(100 - (timeTaken * 2.5)));
                    cursorStatus = 'SUCCESS';

                    let selectedPhrase = correctStreak <= 1 ? praisePhrases.low[Math.floor(Math.random() * praisePhrases.low.length)] :
                                         (correctStreak <= 3 ? praisePhrases.medium[Math.floor(Math.random() * praisePhrases.medium.length)] : 
                                         praisePhrases.high[Math.floor(Math.random() * praisePhrases.high.length)]);
                    if (correctStreak >= 2) selectedPhrase += ` That's a ${correctStreak} answer streak!`;
                    speak(selectedPhrase);
                    
                    setTimeout(() => {
                        if (currentRound < totalRounds) { currentRound++; initRound(); } 
                        else { gameState = 'FINISHED'; isTransitioning = false; speak(`Fantastic! You scored ${score} Points!`); }
                    }, 1800);
                } else {
                    correctStreak = 0; cursorStatus = 'MISS';
                    speak(`Oops, try again! Which letter is ${targetLetter}?`);
                    resetCardPosition(draggedElement);
                    draggedElement = null;
                }
            } else {
                resetCardPosition(draggedElement);
                draggedElement = null;
            }
        }

        function resetCardPosition(card) {
            card.x = card.ox; card.y = card.oy; card.w = card.ow; card.h = card.oh; card.isSnapped = false;
        }

        // --- Layout Coordinators for State Machine ---
        function updateGameLogic() {
            let currentTime = Date.now();
            
            // ⭐ [จุดปรับปรุงแก้ไข]: ระบบตรวจสอบการปล่อยอัจฉริยะ (Smart Release Override)
            // หากการ์ดถูกดูด (Snap) เข้าล็อกในช่องคำตอบแล้ว เราจะไม่รอหน่วงเวลา Buffer 300ms อีกต่อไป เพื่อให้เด็กกางนิ้วปล่อยคำตอบได้ทันทีแบบ 0ms
            let isInsideDropZone = false;
            if (draggedElement) {
                let cardCenterX = draggedElement.x + draggedElement.w / 2;
                let cardCenterY = draggedElement.y + draggedElement.h / 2;
                let zoneCenterX = dropZone.x + dropZone.w / 2;
                let zoneCenterY = dropZone.y + dropZone.h / 2;
                let dist = Math.sqrt(Math.pow(cardCenterX - zoneCenterX, 2) + Math.pow(cardCenterY - zoneCenterY, 2));
                if (dist < SNAP_DISTANCE || draggedElement.isSnapped) {
                    isInsideDropZone = true;
                }
            }

            // ถ้าอยู่ข้างนอกช่องคำตอบ ให้ใช้ Buffer ป้องกันการหลุด แต่ถ้าอยู่ในช่องคำตอบแล้ว บังคับตัด Buffer ทิ้งเพื่อให้ปล่อยง่าย!
            let isCurrentlyPinching = isPinching || (!isInsideDropZone && (currentTime - lastPinchTime < UNPINCH_BUFFER_TIME));

            cursorStatus = 'NORMAL';
            let panelW = Math.min(canvas.width - 40, isMobile ? 340 : 600);
            let panelH = isMobile ? 420 : 320;

            if (gameState === 'START') {
                buttons.startBtn.x = (canvas.width - buttons.startBtn.w) / 2;
                buttons.startBtn.y = canvas.height / 2 + (isMobile ? 60 : 50);
                if (isHovering(buttons.startBtn) && isCurrentlyPinching) {
                    if ('speechSynthesis' in window) window.speechSynthesis.speak(new SpeechSynthesisUtterance("")); 
                    gameState = 'SELECT_MODE'; isPinching = false; lastPinchTime = 0; speak("Select the letter mode.");
                }
            }
            else if (gameState === 'SELECT_MODE') {
                if (!isMobile) {
                    buttons.modeUpperBtn.x = (canvas.width / 2) - buttons.modeUpperBtn.w - 20;
                    buttons.modeLowerBtn.x = (canvas.width / 2) + 20;
                    buttons.modeUpperBtn.y = buttons.modeLowerBtn.y = canvas.height / 2;
                } else {
                    buttons.modeUpperBtn.x = buttons.modeLowerBtn.x = (canvas.width - buttons.modeUpperBtn.w) / 2;
                    buttons.modeUpperBtn.y = canvas.height / 2 - 30;
                    buttons.modeLowerBtn.y = canvas.height / 2 + 65;
                }
                if (isHovering(buttons.modeUpperBtn) && isCurrentlyPinching) { letterMode = 'UPPER'; gameState = 'SELECT_DIFFICULTY'; isPinching = false; lastPinchTime = 0; speak("Choose difficulty."); }
                if (isHovering(buttons.modeLowerBtn) && isCurrentlyPinching) { letterMode = 'LOWER'; gameState = 'SELECT_DIFFICULTY'; isPinching = false; lastPinchTime = 0; speak("Choose difficulty."); }
            }
            else if (gameState === 'SELECT_DIFFICULTY') {
                if (!isMobile) {
                    let totalW = (buttons.diffEasyBtn.w * 3) + 60;
                    let startX = (canvas.width - totalW) / 2;
                    buttons.diffEasyBtn.x = startX;
                    buttons.diffMedBtn.x = startX + buttons.diffEasyBtn.w + 30;
                    buttons.diffHardBtn.x = startX + (buttons.diffEasyBtn.w * 2) + 60;
                    buttons.diffEasyBtn.y = buttons.diffMedBtn.y = buttons.diffHardBtn.y = canvas.height / 2 + 20;
                } else {
                    let startY = canvas.height / 2 - 60;
                    buttons.diffEasyBtn.x = buttons.diffMedBtn.x = buttons.diffHardBtn.x = (canvas.width - buttons.diffEasyBtn.w) / 2;
                    buttons.diffEasyBtn.y = startY;
                    buttons.diffMedBtn.y = startY + 75;
                    buttons.diffHardBtn.y = startY + 150;
                }
                if (isHovering(buttons.diffEasyBtn) && isCurrentlyPinching) { difficulty = 'EASY'; gameState = 'INSTRUCTION'; isPinching = false; lastPinchTime = 0; speak("Look at the instructions."); }
                if (isHovering(buttons.diffMedBtn) && isCurrentlyPinching) { difficulty = 'MEDIUM'; gameState = 'INSTRUCTION'; isPinching = false; lastPinchTime = 0; speak("Look at the instructions."); }
                if (isHovering(buttons.diffHardBtn) && isCurrentlyPinching) { difficulty = 'HARD'; gameState = 'INSTRUCTION'; isPinching = false; lastPinchTime = 0; speak("Look at the instructions."); }
            }
            else if (gameState === 'INSTRUCTION') {
                buttons.nextBtn.x = (canvas.width - buttons.nextBtn.w) / 2;
                buttons.nextBtn.y = canvas.height / 2 + (isMobile ? 150 : 120);
                if (isHovering(buttons.nextBtn) && isCurrentlyPinching) { gameState = 'PLAYING'; score = 0; currentRound = 1; correctStreak = 0; isPinching = false; lastPinchTime = 0; initRound(); }
            }
            else if (gameState === 'PLAYING') {
                if (isTransitioning) return;
                buttons.audioBtn.x = isMobile ? (canvas.width - buttons.audioBtn.w) / 2 : 30;
                buttons.audioBtn.y = isMobile ? 88 : 105;
                
                dropZone.w = isMobile ? Math.min(220, canvas.width - 60) : 250;
                dropZone.h = isMobile ? 150 : 190;
                dropZone.x = (canvas.width - dropZone.w) / 2;
                dropZone.y = canvas.height - (isMobile ? 190 : 230);

                if (isHovering(buttons.audioBtn) && isCurrentlyPinching) { speak(`Find the letter ${targetLetter}`); isPinching = false; lastPinchTime = 0; }

                if (isCurrentlyPinching) {
                    if (!draggedElement) {
                        for (let card of options) {
                            if (!card.isSnapped && pointerX > card.x && pointerX < card.x + card.w && pointerY > card.y && pointerY < card.y + card.h) {
                                draggedElement = card; card.offsetX = pointerX - card.x; card.offsetY = pointerY - card.y; break;
                            }
                        }
                        if(!draggedElement && pointerY < dropZone.y - 40) cursorStatus = 'MISS';
                    } else {
                        // ถ้าไม่ได้อยู่ในจุดล็อค ให้แผ่นป้ายขยับตามนิ้วปกติแบบเสรี
                        if (!draggedElement.isSnapped) {
                            draggedElement.x = pointerX - draggedElement.offsetX;
                            draggedElement.y = pointerY - draggedElement.offsetY;
                        }
                        cursorStatus = 'SUCCESS';

                        let cardCenterX = draggedElement.x + draggedElement.w / 2;
                        let cardCenterY = draggedElement.y + draggedElement.h / 2;
                        let zoneCenterX = dropZone.x + dropZone.w / 2;
                        let zoneCenterY = dropZone.y + dropZone.h / 2;
                        let dist = Math.sqrt(Math.pow(cardCenterX - zoneCenterX, 2) + Math.pow(cardCenterY - zoneCenterY, 2));

                        if (dist < SNAP_DISTANCE) {
                            draggedElement.isSnapped = true; 
                            draggedElement.x = dropZone.x; 
                            draggedElement.y = dropZone.y; 
                            draggedElement.w = dropZone.w; 
                            draggedElement.h = dropZone.h;
                        } else if (draggedElement.isSnapped) {
                            draggedElement.isSnapped = false; draggedElement.w = draggedElement.ow; draggedElement.h = draggedElement.oh;
                        }
                    }
                } else if (draggedElement) {
                    checkDropSuccess();
                }

                if (!draggedElement) {
                    for (let card of options) {
                        if (pointerX > card.x && pointerX < card.x + card.w && pointerY > card.y && pointerY < card.y + card.h) cursorStatus = 'HOVER';
                    }
                }
            }
            else if (gameState === 'FINISHED') {
                if (isCurrentlyPinching) { gameState = 'START'; isPinching = false; lastPinchTime = 0; }
            }
        }

        function isHovering(btn) { return pointerX > btn.x && pointerX < btn.x + btn.w && pointerY > btn.y && pointerY < btn.y + btn.h; }

        // --- Responsive Rendering Engine ---
        function drawLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save(); ctx.scale(-1, 1); ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height); ctx.restore();
            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)'; ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (rawHandResults && rawHandResults.multiHandLandmarks && rawHandResults.multiHandLandmarks.length > 0) {
                handDetected = true; lastHandSeenTime = Date.now(); handAlert.classList.add('hidden');
                for (const landmarks of rawHandResults.multiHandLandmarks) {
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)'; ctx.lineWidth = 3;
                    for(let i=0; i<landmarks.length; i++) {
                        let pt = landmarks[i];
                        ctx.fillStyle = '#4D96FF'; ctx.beginPath(); ctx.arc(canvas.width - (pt.x * canvas.width), pt.y * canvas.height, 5, 0, 2*Math.PI); ctx.fill();
                    }
                }
            } else if (Date.now() - lastHandSeenTime > 2500) {
                handDetected = false; handAlert.classList.remove('hidden');
            }

            updateGameLogic();
            let pW = Math.min(canvas.width - 30, isMobile ? 330 : 620);
            let pH = isMobile ? 440 : 330;

            if (gameState === 'START') {
                drawGlassRect((canvas.width - pW)/2, (canvas.height - pH)/2, pW, pH);
                ctx.fillStyle = '#FF4A82'; ctx.font = `bold ${isMobile ? 32 : 46}px Fredoka`; ctx.textAlign = 'center';
                ctx.fillText("ABC AR ADVENTURE", canvas.width / 2, canvas.height / 2 - (isMobile ? 50 : 60));
                ctx.fillStyle = '#4A4A4A'; ctx.font = `${isMobile ? 16 : 20}px Fredoka`;
                ctx.fillText("English Alphabet Learning for Kids", canvas.width / 2, canvas.height / 2 - 10);
                drawButton(buttons.startBtn, '#FF6B6B');
            } 
            else if (gameState === 'SELECT_MODE') {
                drawGlassRect((canvas.width - pW)/2, (canvas.height - pH)/2, pW, pH);
                ctx.fillStyle = '#4D96FF'; ctx.font = `bold ${isMobile ? 26 : 36}px Fredoka`; ctx.textAlign = 'center';
                ctx.fillText("Choose Alphabet Mode 🔤", canvas.width / 2, canvas.height / 2 - (isMobile ? 110 : 70));
                drawButton(buttons.modeUpperBtn, '#FF6B6B', 40);
                drawButton(buttons.modeLowerBtn, '#4D96FF', 40);
            }
            else if (gameState === 'SELECT_DIFFICULTY') {
                drawGlassRect((canvas.width - pW)/2, (canvas.height - pH)/2, pW, pH);
                ctx.fillStyle = '#9B51E0'; ctx.font = `bold ${isMobile ? 26 : 36}px Fredoka`; ctx.textAlign = 'center';
                ctx.fillText("Select Difficulty Level 🌟", canvas.width / 2, canvas.height / 2 - (isMobile ? 130 : 70));
                drawButton(buttons.diffEasyBtn, '#6BCB77');
                drawButton(buttons.diffMedBtn, '#FFB26B');
                drawButton(buttons.diffHardBtn, '#FF6B6B');
            }
            else if (gameState === 'INSTRUCTION') {
                let insW = Math.min(canvas.width - 24, 660);
                let insH = isMobile ? 510 : 420;
                drawGlassRect((canvas.width - insW)/2, (canvas.height - insH)/2, insW, insH);
                ctx.fillStyle = '#4D96FF'; ctx.font = `bold ${isMobile ? 28 : 36}px Fredoka`; ctx.textAlign = 'center';
                ctx.fillText("How to Play! ✋", canvas.width / 2, canvas.height / 2 - (isMobile ? 190 : 130));
                ctx.fillStyle = '#555555'; ctx.font = `${isMobile ? 15 : 19}px Fredoka`; ctx.textAlign = 'left';
                let sX = canvas.width / 2 - (isMobile ? 140 : 260);
                let gap = isMobile ? 42 : 50;
                let startY = canvas.height / 2 - (isMobile ? 120 : 65);
                ctx.fillText("1. Show your hand to the camera or use touch.", sX, startY);
                ctx.fillText("2. Aim at the correct alphabet letter card.", sX, startY + gap);
                ctx.fillText("3. Pinch thumb and index finger to grab it.", sX, startY + (gap * 2));
                ctx.fillText("4. Drag and drop the card into the space below!", sX, startY + (gap * 3));
                drawButton(buttons.nextBtn, '#6BCB77');
            } 
            else if (gameState === 'PLAYING') {
                let topH = isMobile ? 74 : 65;
                drawGlassRect(15, 12, canvas.width - 30, topH);
                ctx.fillStyle = '#333333'; ctx.font = `bold ${isMobile ? 16 : 22}px Fredoka`; ctx.textAlign = 'left';
                ctx.fillText(`Round: ${currentRound}/${totalRounds}`, 30, 12 + (topH/2) + 6);
                ctx.textAlign = 'right'; ctx.fillStyle = '#FF6B6B';
                let sText = correctStreak > 0 ? ` (🔥 ${correctStreak})` : '';
                ctx.fillText(`Score: ${score}${sText}`, canvas.width - 30, 12 + (topH/2) + 6);
                
                ctx.textAlign = 'center'; ctx.fillStyle = '#4D96FF'; ctx.font = `bold ${isMobile ? 14 : 24}px Fredoka`;
                ctx.fillText(isMobile ? "Listen & drop the card! 🎧" : "Listen to the sound and find the right letter! 🎧", canvas.width / 2, 12 + (topH/2) + 6);

                drawButton(buttons.audioBtn, '#9B51E0', isMobile ? 16 : 20);

                ctx.lineWidth = 4; ctx.strokeStyle = '#6BCB77'; ctx.setLineDash([10, 6]);
                ctx.fillStyle = 'rgba(107, 203, 119, 0.12)'; ctx.beginPath(); ctx.roundRect(dropZone.x, dropZone.y, dropZone.w, dropZone.h, 20); ctx.fill(); ctx.stroke(); ctx.setLineDash([]); 
                ctx.fillStyle = '#2c7a33'; ctx.font = `bold ${isMobile ? 16 : 20}px Fredoka`; ctx.textAlign = 'center';
                ctx.fillText("➔ Drop Here 🕳️", dropZone.x + dropZone.w/2, dropZone.y + dropZone.h/2 + 6);

                options.forEach(card => { if (card !== draggedElement) drawLetterCard(card); });
                if (draggedElement) drawLetterCard(draggedElement, true);
            } 
            else if (gameState === 'FINISHED') {
                drawGlassRect((canvas.width - pW)/2, (canvas.height - pH)/2, pW, pH);
                ctx.fillStyle = '#6BCB77'; ctx.font = `bold ${isMobile ? 38 : 54}px Fredoka`; ctx.textAlign = 'center';
                ctx.fillText("🎉 Success! 🎉", canvas.width / 2, canvas.height / 2 - 40);
                ctx.fillStyle = '#333333'; ctx.font = `${isMobile ? 20 : 28}px Fredoka`;
                ctx.fillText(`Your Score: ${score} Points`, canvas.width / 2, canvas.height / 2 + 20);
                ctx.fillStyle = '#888888'; ctx.font = '15px Fredoka';
                ctx.fillText("(Pinch or touch anywhere to replay)", canvas.width / 2, canvas.height / 2 + (isMobile ? 110 : 80));
            }

            drawCursorFeedback(pointerX, pointerY, cursorStatus);
            requestAnimationFrame(drawLoop);
        }

        function drawGlassRect(x, y, w, h) {
            ctx.save(); ctx.fillStyle = 'rgba(255, 255, 255, 0.45)'; ctx.shadowColor = 'rgba(31, 38, 135, 0.08)'; ctx.shadowBlur = 15;
            ctx.beginPath(); ctx.roundRect(x, y, w, h, 20); ctx.fill(); ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)'; ctx.stroke(); ctx.restore();
        }

        function drawButton(btn, color, fontSize = 20) {
            ctx.save(); let isHover = isHovering(btn); ctx.fillStyle = color; ctx.shadowColor = color; ctx.shadowBlur = isHover ? 12 : 4;
            let o = isHover ? 2 : 0; ctx.beginPath(); ctx.roundRect(btn.x - o, btn.y - o, btn.w + (o*2), btn.h + (o*2), 16); ctx.fill();
            ctx.fillStyle = '#FFFFFF'; ctx.font = `bold ${fontSize}px Fredoka`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(btn.text, btn.x + btn.w/2, btn.y + btn.h/2); ctx.restore();
        }

        function drawLetterCard(card, isDragged = false) {
            ctx.save(); ctx.shadowColor = 'rgba(0,0,0,0.15)'; ctx.shadowBlur = isDragged ? 20 : 8;
            ctx.fillStyle = card.color; ctx.beginPath(); ctx.roundRect(card.x, card.y, card.w, card.h, 16); ctx.fill();
            ctx.lineWidth = card.isSnapped ? 5 : 3.5; ctx.strokeStyle = '#FFFFFF'; ctx.stroke();
            ctx.fillStyle = '#FFFFFF'; ctx.font = `bold ${Math.floor(card.h * 0.54)}px Fredoka`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(card.char, card.x + card.w/2, card.y + card.h/2); ctx.restore();
        }

        function drawCursorFeedback(x, y, status) {
            ctx.save(); ctx.translate(x, y);
            if (status === 'NORMAL') {
                ctx.fillStyle = 'rgba(255, 74, 130, 0.75)'; ctx.beginPath(); ctx.arc(0, 0, 14, 0, 2*Math.PI); ctx.fill();
                ctx.strokeStyle = '#FFFFFF'; ctx.lineWidth = 2; ctx.stroke();
            } else if (status === 'HOVER') {
                ctx.strokeStyle = '#FFD93D'; ctx.lineWidth = 3.5; ctx.setLineDash([4, 3]); ctx.beginPath(); ctx.arc(0, 0, 22, 0, 2*Math.PI); ctx.stroke();
                ctx.fillStyle = 'rgba(255, 217, 61, 0.45)'; ctx.beginPath(); ctx.arc(0, 0, 10, 0, 2*Math.PI); ctx.fill();
            } else if (status === 'MISS') {
                ctx.fillStyle = 'rgba(255, 107, 107, 0.85)'; ctx.beginPath(); ctx.arc(0, 0, 18, 0, 2*Math.PI); ctx.fill();
                ctx.strokeStyle = '#FFFFFF'; ctx.lineWidth = 2; ctx.stroke();
            } else if (status === 'SUCCESS') {
                ctx.fillStyle = 'rgba(107, 203, 119, 0.9)'; ctx.beginPath(); ctx.arc(0, 0, 20, 0, 2*Math.PI); ctx.fill();
                ctx.strokeStyle = '#FFFFFF'; ctx.lineWidth = 2; ctx.stroke(); ctx.fillStyle = '#FFFFFF'; ctx.font = 'bold 15px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('✔️', 0, 1);
            }
            ctx.restore();
        }

        // --- MediaPipe Hands Configuration ---
        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.55, minTrackingConfidence: 0.55 });

        hands.onResults((results) => {
            rawHandResults = results;
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const thumb = landmarks[4];
                const indexFinger = landmarks[8];

                pointerX = canvas.width - (indexFinger.x * canvas.width);
                pointerY = indexFinger.y * canvas.height;

                let dx = (thumb.x - indexFinger.x) * canvas.width;
                let dy = (thumb.y - indexFinger.y) * canvas.height;
                let distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < 58) {
                    isPinching = true;
                    lastPinchTime = Date.now(); 
                } else {
                    isPinching = false;
                }
            } else {
                if (!isMouseDown) isPinching = false;
            }
        });

        const camera = new Camera(video, {
            onFrame: async () => { await hands.send({ image: video }); },
            width: isMobile ? 720 : 1280,
            height: isMobile ? 1280 : 720
        });
        camera.start().catch(err => { console.log("Fallback simulation mode ready."); });

        requestAnimationFrame(drawLoop);
    </script>
</body>
</html>
